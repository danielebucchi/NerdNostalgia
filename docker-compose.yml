version: "3.9"

services:
  db:
    image: postgres:15
    container_name: nerdnostalgia_db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: nerdnostalgia
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./database:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d nerdnostalgia"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: nerdnostalgia-backend
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "7373:7373"
    volumes:
      - ./tmp:/tmp/nerdnostalgia
      - ./backend:/app
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/nerdnostalgia
      - APP_TMP_DIR=/tmp/nerdnostalgia

volumes:
  db_data:
