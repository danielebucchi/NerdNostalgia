services:
  backend:
    build: ./backend
    container_name: nerdnostalgia-backend
    restart: unless-stopped
    ports:
      - "7373:7373"
    volumes:
      - ./tmp:/tmp/nerdnostalgia
      - ./backend:/app
      - ./database:/app/database:ro
      - ./data:/app/data
    environment:
      - DATABASE_URL=sqlite:////app/data/nerdnostalgia.db
      - SQLITE_DB_PATH=/app/data/nerdnostalgia.db
      - APP_TMP_DIR=/tmp/nerdnostalgia
      - TZ=${TZ:-Europe/Rome}
      - APP_TIMEZONE=${APP_TIMEZONE:-Europe/Rome}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-dev-secret-change-me}
      - DISABLE_SCHEDULER=${DISABLE_SCHEDULER:-}
      # SMTP
      - EMAIL_ENABLED=${EMAIL_ENABLED:-0}
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - EMAIL_FROM=${EMAIL_FROM:-}
      - EMAIL_TO_ADMIN=${EMAIL_TO_ADMIN:-nerdnostalgiaita@gmail.com}
      # Backup (opzionali)
      - BACKUP_S3_BUCKET=${BACKUP_S3_BUCKET:-}
      - BACKUP_S3_ENDPOINT=${BACKUP_S3_ENDPOINT:-}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-auto}
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:7373/health"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build: ./frontend
    container_name: nerdnostalgia-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3737:3737"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    environment:
      - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL:-http://localhost:7373}
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-http://localhost:3737}
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
      - TZ=${TZ:-Europe/Rome}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  frontend_node_modules:
  frontend_next:
