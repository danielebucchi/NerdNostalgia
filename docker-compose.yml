# Compose di PRODUZIONE (default).
# Per dev locale con hot reload usa anche l'overlay:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d --build
#
# Caratteristiche prod:
#  - Frontend buildato da Dockerfile.prod (next build + standalone, no hot reload)
#  - Backend senza bind mount del codice (codice nell'immagine)
#  - Porte espose solo su 127.0.0.1 (Caddy fa il bridge pubblico)
#  - Healthcheck + log rotation + restart policies
#
# Garganacl (Ansible) clona la repo, scrive .env (da apps.yml/vault), e fa
# `docker compose up -d`. Questo file e' quello che vuole vedere.

services:
  backend:
    build: ./backend
    container_name: nerdnostalgia-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:7373:7373"
    volumes:
      - ./tmp:/tmp/nerdnostalgia
      - ./database:/app/database:ro
      - ./data:/app/data
    environment:
      - DATABASE_URL=sqlite:////app/data/nerdnostalgia.db
      - SQLITE_DB_PATH=/app/data/nerdnostalgia.db
      - APP_TMP_DIR=/tmp/nerdnostalgia
      - TZ=${TZ:-Europe/Rome}
      - APP_TIMEZONE=${APP_TIMEZONE:-Europe/Rome}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-dev-secret-change-me}
      - DISABLE_SCHEDULER=${DISABLE_SCHEDULER:-}
      # SMTP
      - EMAIL_ENABLED=${EMAIL_ENABLED:-0}
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - EMAIL_FROM=${EMAIL_FROM:-}
      - EMAIL_TO_ADMIN=${EMAIL_TO_ADMIN:-nerdnostalgiaita@gmail.com}
      # Backup S3/R2 (opzionali)
      - BACKUP_S3_BUCKET=${BACKUP_S3_BUCKET:-}
      - BACKUP_S3_ENDPOINT=${BACKUP_S3_ENDPOINT:-}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-auto}
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:7373/health"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:7373}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3737}
    container_name: nerdnostalgia-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:3737:3737"
    environment:
      - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL:-http://localhost:7373}
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-http://localhost:3737}
      - TZ=${TZ:-Europe/Rome}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
