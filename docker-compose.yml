services:
  backend:
    build: ./backend
    container_name: nerdnostalgia-backend
    restart: unless-stopped
    ports:
      - "7373:7373"
    volumes:
      - ./tmp:/tmp/nerdnostalgia
      - ./backend:/app
      - ./database:/app/database:ro
      - ./data:/app/data
    environment:
      - DATABASE_URL=sqlite:////app/data/nerdnostalgia.db
      - SQLITE_DB_PATH=/app/data/nerdnostalgia.db
      - APP_TMP_DIR=/tmp/nerdnostalgia

  frontend:
    build: ./frontend
    container_name: nerdnostalgia-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3737:3737"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:7373
      - NEXT_PUBLIC_SITE_URL=http://localhost:3737
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true

volumes:
  frontend_node_modules:
  frontend_next:
