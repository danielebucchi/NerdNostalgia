[pytest]
testpaths = tests
python_files = test_*.py
addopts = -ra --strict-markers --tb=short --cov=src --cov-report=term-missing:skip-covered --cov-report=xml
markers =
    slow: test che richiedono piu' di qualche secondo

[coverage:run]
omit =
    src/utils/vinted_*.py
    src/utils/scheduler.py
    src/utils/email.py
    src/utils/storage.py
    src/utils/backup.py
    tests/*
