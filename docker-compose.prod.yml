# Overlay produzione.
# Uso:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Differenze rispetto al compose dev:
#  - Frontend buildato con next build + standalone, no bind mount, no polling
#  - Backend: codice immutabile dentro l'immagine, niente bind ./backend
#  - Niente file di stato in node_modules/.next dei container
#  - APP_TIMEZONE/TZ esplicito Europe/Rome (gia' di default ma esplicitato)

services:
  backend:
    volumes:
      # In prod: niente bind del codice (codice copiato nell'immagine al build)
      - ./tmp:/tmp/nerdnostalgia
      - ./database:/app/database:ro
      - ./data:/app/data
    environment:
      - DISABLE_SCHEDULER=

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-https://nerdnostalgia.it}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://nerdnostalgia.it}
    volumes: []   # nessun bind: usa il bundle standalone nell'immagine
    environment:
      # In prod il pubblico chiama via dominio HTTPS, non localhost
      - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL:-https://nerdnostalgia.it}
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-https://nerdnostalgia.it}
      - TZ=${TZ:-Europe/Rome}
