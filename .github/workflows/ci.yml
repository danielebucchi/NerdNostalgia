name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: backend/requirements-test.txt

      - name: Install backend deps (test)
        working-directory: backend
        run: |
          pip install --upgrade pip
          # NB: niente Playwright qui — i test backend non lo usano e l'install
          # di Chromium aggiungerebbe ~1.5GB per nessun beneficio. I pacchetti
          # presenti in src/requirements.txt vengono comunque installati
          # (incluso playwright) ma senza i browser scaricati.
          pip install -r requirements-test.txt

      - name: Run pytest + coverage
        working-directory: backend
        env:
          JWT_SECRET_KEY: ci-test-secret
          DISABLE_SCHEDULER: "1"
          EMAIL_ENABLED: "0"
          PYTHONPATH: src
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-backend
          path: backend/coverage.xml
          if-no-files-found: ignore

  frontend-tests:
    name: Frontend (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Run Vitest
        working-directory: frontend
        run: npm run test:run

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit
