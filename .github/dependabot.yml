version: 2

# Auto-PR settimanali per security + minor updates su:
# - Python deps backend (pip)
# - npm deps frontend
# - GitHub Actions workflows
# - Docker base images (backend + frontend Dockerfile)

updates:
  # Backend Python
  - package-ecosystem: pip
    directory: /backend/src
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels: ["deps", "python"]
    commit-message:
      prefix: "chore(deps-py)"

  # Frontend npm
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels: ["deps", "frontend"]
    commit-message:
      prefix: "chore(deps-npm)"
    groups:
      # Raggruppa gli aggiornamenti minor/patch di Next/React per ridurre rumore
      next-react:
        patterns:
          - "next"
          - "react"
          - "react-dom"
          - "@types/react*"

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels: ["deps", "ci"]
    commit-message:
      prefix: "chore(deps-ci)"

  # Docker base images
  - package-ecosystem: docker
    directory: /backend
    schedule:
      interval: monthly
    labels: ["deps", "docker"]
    commit-message:
      prefix: "chore(deps-docker)"

  - package-ecosystem: docker
    directory: /frontend
    schedule:
      interval: monthly
    labels: ["deps", "docker"]
    commit-message:
      prefix: "chore(deps-docker)"
