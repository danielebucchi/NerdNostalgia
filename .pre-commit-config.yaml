# Hooks lanciati prima di ogni commit.
# Setup: `pip install pre-commit && pre-commit install` (oppure `pipx install pre-commit`).
# Bypass occasionale: `git commit --no-verify`.

repos:
  # ----- Generic hygiene -----
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-yaml
        exclude: ^\.github/workflows/  # actions hanno comportamenti yaml non standard
      - id: check-added-large-files
        args: ["--maxkb=2000"]
      - id: detect-private-key
      - id: mixed-line-ending
        args: ["--fix=lf"]

  # ----- Python: ruff (lint + format) -----
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: ["--fix"]
        files: ^backend/.*\.py$
      - id: ruff-format
        files: ^backend/.*\.py$

  # ----- JS/TS/CSS: prettier -----
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        files: ^frontend/.*\.(ts|tsx|js|jsx|css|md)$
        exclude: ^frontend/(\.next|node_modules)/
